- name: Seguenon Kone featuring Ivorie Spectacle
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '11:30'
  end: '12:30'
  genre: World
  about: |-
    Master percussionist Seguenon Kone grew up in Ivory Coast playing balafon and
    djembe from the age of four, eventually touring with the National Ballet of the
    Ivory Coast as a teenager. After settling in New Orleans in 2008, he became a
    respected educator and ambassador for the deep cultural links between West Africa
    and the Crescent City. His ensemble Ivorie Spectacle is a drum-and-dance
    celebration of Ivorian music, costume, and rhythm that will get the whole crowd
    on their feet.
  about_source: researched
  websites:
  - https://nolajazzmuseum.org/events/2022/12/15/the-new-orleans-jazz-museum-and-jazz-national-historical-park-presents-the-kone-residency-show
- name: The Quickening
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '12:50'
  end: '13:50'
  genre: Mixed / Eclectic
  about: |-
    The Quickening formed in 2012 after frontman Blake Quick left local funk band
    Flow Tribe, and the group has been a staple of the New Orleans jam scene ever
    since. Vocalist Rachel 'Mama Ray' Murray shares lead duties with Quick, and
    their chemistry drives a sound soaked in soul, exploratory jamming, and
    Grateful Dead storytelling. A rotating cast of horns, pedal steel, and strings
    keeps every show unpredictable and dance-floor ready.
  about_source: researched
  websites:
  - https://thequickeningmusic.bandcamp.com/
  - https://www.instagram.com/thequickeningmusic/
- name: Kermit Ruffins & the Barbecue Swingers
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '14:10'
  end: '15:10'
  genre: Jazz (Traditional)
  about: |-
    Kermit Ruffins is a New Orleans institution: trumpeter, singer, and co-founder
    of the Rebirth Brass Band who has been spreading joy and Louis Armstrong-
    inspired horn work since the 1980s. His Barbecue Swingers, formed in 1992, are
    the perfect festival act -- tight traditional jazz with a party vibe, and Kermit
    himself might fire up the grill right on stage. Catch him if you want a genuine
    taste of New Orleans in every sense of the word.
  about_source: researched
  websites:
  - https://www.kermitslounge.com/
  - https://www.basinstreetrecords.com/artists/kermit-ruffins/
- name: Big Chief Juan Pardo's Tribal Gold
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '15:30'
  end: '16:30'
  genre: Indian Mardi Gras
  about: |-
    Big Chief Juan Pardo of the Golden Comanche tribe was born into the Black
    Masking Indian tradition and has been masking for over 20 years. Tribal Gold
    merges the Golden Comanche's chanting and tambourine-driven rhythms with the
    funky firepower of members of the New Orleans Suspects, creating a sound that
    crosses boundaries while honoring deep cultural roots. Pardo is also a published
    author and visual artist, making this one of the most multidimensional acts on
    the schedule.
  about_source: researched
  websites:
  - https://ellanola.org/ellanotes/big-chief-juan-pardo-born-into-the-tradition-and-bringing-it-forward
  - https://ragman.org/tribal-gold
- name: Erica Falls & Vintage Soul
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '16:50'
  end: '18:10'
  genre: R&B / Soul
  about: |-
    Erica Falls grew up in the 9th Ward steeped in the music of Aretha Franklin
    and Nina Simone, and she has carried that torch into a powerhouse career of her
    own. After five years as the featured vocalist with Galactic, she launched her
    solo project with the acclaimed album Homegrown. Multiple Offbeat Best Female
    Vocalist awards and collaborations with Allen Toussaint, Dr. John, and Sting
    speak to her standing. Her band Vintage Soul delivers exactly what the name
    promises -- timeless R&B that never left.
  about_source: researched
  websites:
  - https://www.ericafalls.com/
- name: The Soul Rebels
  stage: Abita Beer Stage
  date: '2026-04-16'
  start: '18:40'
  end: '20:00'
  genre: Brass Band
  about: |-
    The Soul Rebels are an eight-piece brass powerhouse that fuse New Orleans
    second-line tradition with funk, hip-hop, and pop. Percussionists Derrick Moss
    and Lumar LeBlanc started the group out of Harold Dejan's Young Olympia Brass
    Band, and Cyril Neville gave them their name at a Tipitina's gig. Since then
    they have landed on NPR's Tiny Desk, The Late Show with Stephen Colbert, and
    scored music for Disney's Haunted Mansion. Their late-afternoon set is the
    perfect send-off for Thursday's festival crowd.
  about_source: researched
  websites:
  - https://thesoulrebels.com/
- name: Preservation Brass
  stage: NewOrleans.com Stage
  date: '2026-04-16'
  start: '11:15'
  end: '12:25'
  genre: Brass Band
  about: |-
    The resident brass band of Preservation Hall, New Orleans' most treasured jazz
    venue, Preservation Brass carries on the lineage of Dejan's Olympia Brass Band.
    Led by trumpeters Mark Braud and Kevin Louis, the group earned a 2025 Grammy
    nomination for Best Regional Roots Music Album with their record For Fat Man.
    Hearing them outside the intimate Hall setting lets you appreciate the full
    power of their horn section in the open air.
  about_source: researched
  websites:
  - https://www.preservationhall.com/people/preservation-brass/
- name: Banu Gibson
  stage: NewOrleans.com Stage
  date: '2026-04-16'
  start: '12:45'
  end: '14:00'
  genre: Jazz (Traditional)
  about: |-
    Banu Gibson is one of the few contemporary vocalists devoted exclusively to the
    songs of the 1920s, 30s, and 40s. A singer, bandleader, dancer, and banjoist,
    she moved to New Orleans in 1973 and founded her Hot Jazz Orchestra in 1981.
    The ensemble has played with symphony orchestras from the Boston Pops to San
    Diego, and Gibson also runs the New Orleans Trad Jazz Camp. Her swinging stage
    presence makes her a perennial FQF favorite.
  about_source: researched
  websites:
  - http://www.banugibson.com/
- name: Mahogany Hall All Stars Band
  stage: NewOrleans.com Stage
  date: '2026-04-16'
  start: '14:20'
  end: '15:30'
  genre: Jazz (Traditional)
  about: |-
    Named for the Mahogany Jazz Hall in the Marigny, this all-star ensemble is led
    by clarinetist and educator Tom Fischer and features veteran musicians who bring
    decades of experience to every performance. The five-piece group keeps the
    flame of traditional New Orleans jazz burning bright with tight arrangements
    and an easy, swinging feel that sounds right at home on a French Quarter stage.
  about_source: researched
  websites:
  - https://www.wwoz.org/organizations/mahogany-jazz-hall
- name: Leroy Jones & New Orleans' Finest
  stage: NewOrleans.com Stage
  date: '2026-04-16'
  start: '15:50'
  end: '17:10'
  genre: Jazz (Traditional)
  about: |-
    Trumpeter Leroy Jones has embodied the spirit of traditional New Orleans jazz
    for over fifty years. He was leading the Fairview Baptist Church Marching Band
    at age 12, went on to join Harry Connick Jr.'s big band, and earned a place in
    the New Orleans Jazz Hall of Fame. With his group New Orleans' Finest, he
    delivers the real deal: warm tone, impeccable swing, and a direct line back to
    the earliest days of jazz in this city.
  about_source: researched
  websites:
  - https://www.preservationhall.com/people/leroy-jones/
- name: The Lilli Lewis Project
  stage: NewOrleans.com Stage
  date: '2026-04-16'
  start: '17:30'
  end: '18:45'
  genre: Singer-Songwriter
  about: |-
    Lilli Lewis is a classically trained opera singer and pianist who reinvented
    herself as the 'Folk Rock Diva' after moving to New Orleans. Backed by a big
    band of top local musicians, the Lilli Lewis Project blends folk, rock, soul,
    and jazz into something uniquely personal. Her album Americana landed on NPR
    Music's Top 10 Albums of the Week, and her rich mezzo-soprano voice fills every
    corner of whatever stage she takes.
  about_source: researched
  websites:
  - https://www.lillilewis.com/2022/
  - https://lillilewisproject.com/
- name: Mem Shannon & The Membership
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '11:10'
  end: '12:10'
  genre: Blues
  about: |-
    Mem Shannon is a New Orleans bluesman with one of the great origin stories:
    a cab driver who put his music career on hold after his father's death, then
    returned to the stage in 1990 at the urging of a former bandmate. His debut,
    A Cab Driver's Blues, earned critical acclaim, and his song S.U.V. won Living
    Blues magazine's Critics Poll Song of the Year. Shannon and The Membership
    deliver gritty, original New Orleans blues with a storyteller's touch.
  about_source: researched
  websites:
  - https://www.memshannon.com/
- name: Sir Chantz Powell & The Sound Of Funk (S.O.F.)
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '12:30'
  end: '13:30'
  genre: Funk
  about: |-
    Sir Chantz Powell is a singer, trumpeter, dancer, and actor who signed with
    Decca/Universal at age 16 and has headlined stages from the Royal Albert Hall
    to the North Sea Jazz Festival. A true New Orleans multi-talent, he brings a
    high-energy show rooted in funk and soul that draws on the city's brass
    tradition while pushing it into contemporary territory. His band The Sound Of
    Funk keeps the groove tight and the audience moving.
  about_source: researched
  websites:
  - https://www.chantz.com/home/
  - https://playingforchange.com/artists/chantz-powell
- name: Susan Cowsill
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '13:50'
  end: '14:50'
  genre: Singer-Songwriter
  about: |-
    Susan Cowsill rose to fame as the youngest member of the 1960s family band
    The Cowsills, singing on their number-one hit Hair as a child. She relocated
    to New Orleans in 1993 and built a second career as a folk-rock songwriter,
    joining the Continental Drifters and later going solo. Rolling Stone called
    her album Lighthouse 'an earthy, often crunchy folk-rock gem.' Her lived-in
    voice and warm stage presence make her a natural fit for an afternoon set.
  about_source: researched
  websites:
  - https://susancowsillband.bandcamp.com/
- name: Yusa & Mahmoud Chouki
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '15:10'
  end: '16:10'
  genre: World
  about: |-
    This pairing brings together two globe-spanning musical voices. Yusa is a
    Cuban singer-songwriter from the Buena Vista district of Havana, known as a
    top ambassador for 21st-century Cuban music and a former musical director of
    the band Interactivo. Mahmoud Chouki is a Moroccan-born master guitarist now
    based in New Orleans whose art bridges European classical, Andalusian, and
    Latin American traditions. Together they weave an irresistible cross-cultural
    conversation that could only happen in a city like New Orleans.
  about_source: researched
  websites:
  - https://en.wikipedia.org/wiki/Yusa
  - https://www.frenchquarterjournal.com/archives/the-magic-of-mahmoud-chouki
- name: Royal Essence
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '16:30'
  end: '17:45'
  genre: R&B / Soul
  about: |-
    Royal Essence is a New Orleans show band made up of veteran musicians and
    powerhouse vocalists. They serve as the house band for the Zulu Social Aid
    and Pleasure Club, performing at Lundi Gras and Mardi Gras balls year after
    year. Their repertoire spans classic R&B, blues, pop, and dance music, with
    influences from Ray Charles to Stevie Wonder. Expect polished choreography,
    tight horn arrangements, and that unmistakable Big Easy party energy.
  about_source: researched
  websites:
  - https://royalessenceshowband.com/
- name: Bag of Donuts
  stage: Tropical Isle Hand Grenade Stage
  date: '2026-04-16'
  start: '18:15'
  end: '19:45'
  genre: Rock
  about: |-
    Four-time Offbeat Cover Band of the Year and the first cover band inducted
    into the Louisiana Music Hall of Fame, Bag of Donuts has been a New Orleans
    party institution since 1988. The six-piece group plays what they call
    Superpop -- hits from every era delivered with kabuki makeup, wild costumes,
    and boundless energy. They were the first cover band to play Jazz Fest and
    the first to sell out House of Blues. Closing out the Tropical Isle stage on
    Thursday, they are guaranteed to leave the crowd grinning.
  about_source: researched
  websites:
  - https://bagofdonuts.com/
- name: R & R Smokin' Foundation
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '11:10'
  end: '12:30'
  genre: Funk
  about: |-
    R & R Smokin' Foundation is a New Orleans funk outfit that brings a heavy
    groove to the local festival circuit. Rooted in the city's deep funk tradition,
    the band layers tight horn lines over driving rhythms to get crowds moving
    early in the day. They are a welcome addition to the Jack Daniel's Stage
    lineup, setting the tone for a stacked Thursday bill.
  about_source: generated
  websites: []
- name: Bon Bon Vivant
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '12:50'
  end: '13:50'
  genre: Rock
  about: |-
    Bon Bon Vivant is a New Orleans indie band helmed by songwriter and front-
    woman Abigail Cosio, saxophonist Jeremy Kelley, and sister-harmony vocalist
    Glori Cosio. Their sound blends bawdy cabaret, dark ballads, and uptempo
    indie dance rock -- think Amy Winehouse meets Florence and the Machine with
    a New Orleans twist. Offbeat named them Best Emerging Artist of 2018, and
    their Jazz Fest debut in 2022 cemented their arrival on the big stage.
  about_source: researched
  websites:
  - https://www.bonbonvivantmusic.com/
- name: Juice
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '14:10'
  end: '15:10'
  genre: Funk
  about: |-
    Founded by bassist and vocalist Dave Jordan at LSU in 1996, Juice exploded
    onto the New Orleans scene in 1998 and quickly became one of the city's premier
    touring funk acts. At their peak they averaged 160 shows a year, earning the
    Offbeat Best Emerging Funk/Soul/R&B Band award in 2000. Their creative mix of
    New Orleans funk, blues, second line, and rock keeps the dance floor packed
    from the first note.
  about_source: researched
  websites:
  - https://www.nolajuicemusic.com/
- name: Sierra Green and the Giants
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '15:30'
  end: '16:40'
  genre: R&B / Soul
  about: |-
    Sierra Green grew up in the 7th Ward singing in church, then learned to
    command an audience by busking on Frenchmen Street. Before long she graduated
    to packed club residencies and became known as the Queen of Frenchmen Street.
    Her band the Giants -- bassist Miguel Perez, guitarist Paul Provosty, and a
    full horn section -- backs her on soulful originals that live at the crossroads
    of soul, blues, and R&B. Their album Here We Are is proof this crew has arrived.
  about_source: researched
  websites:
  - https://sierragreenandthegiants.com/
- name: Rebirth Brass Band
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '17:00'
  end: '18:20'
  genre: Brass Band
  about: |-
    Rebirth Brass Band has been a cornerstone of New Orleans music since 1983,
    when Philip and Keith Frazier, Kermit Ruffins, and friends from Treme launched
    the group at Clark Senior High School. Grammy winners for Rebirth of New
    Orleans, they fuse traditional second-line brass with funk, hip-hop, and soul
    in a way that is simultaneously reverent and revolutionary. If you see one
    brass band at the festival, make it this one.
  about_source: researched
  websites:
  - https://rebirthbrassband.com/
- name: Bobby Rush
  stage: Jack Daniel's Stage
  date: '2026-04-16'
  start: '18:50'
  end: '20:00'
  genre: Blues
  about: |-
    Three-time Grammy winner, Blues Hall of Famer, and self-proclaimed King of the
    Chitlin' Circuit, Bobby Rush has been performing for over six decades. Born in
    Homer, Louisiana, he honed his craft alongside Muddy Waters and Little Walter
    in Chicago before developing a style he calls 'folk funk' -- deeply rooted yet
    decidedly modern. At 92, his live show remains one of the most colorful and
    energetic in the blues world. Do not miss this legend.
  about_source: researched
  websites:
  - https://www.bobbyrushbluesman.com/
- name: T'Monde
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '11:10'
  end: '12:20'
  genre: Cajun
  about: |-
    T'Monde -- Cajun French for 'little people' or 'little world' -- features
    three accomplished young musicians with a combined ten Grammy nominations.
    Drew Simon, Megan Brown, and Kellii Jones play old-fashioned Cajun music
    ranging from rocking two-steps to sorrowful waltzes, drawing on influences
    from early country to ancient French and Creole ballads. Offbeat calls them
    'a creative fusion of classic country and out-of-the-way Cajun.' The perfect
    way to kick off the Willow stage's Cajun and zydeco Thursday.
  about_source: researched
  websites:
  - http://www.tmonde.com/
- name: Gerard Delafose and The Zydeco Gators
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '12:40'
  end: '13:50'
  genre: Zydeco
  about: |-
    Gerard Delafose comes from zydeco royalty: his grandfather John Delafose was
    a legend, and his uncle Geno carries the family banner forward. Gerard has been
    performing since age four and formed the Zydeco Gators in 2007. A Grammy-
    nominated international touring act, the band plays over 100 shows a year,
    from Jazz Fest to Switzerland's Blues to Bop festival. Expect hard-driving
    accordion and washboard grooves that will have you two-stepping in the grass.
  about_source: researched
  websites:
  - https://gerarddelafose.com/
- name: Waylon Thibodeaux Band
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '14:10'
  end: '15:10'
  genre: Cajun
  about: |-
    Dubbed 'Louisiana's Rockin' Fiddler,' Waylon Thibodeaux has been performing
    professionally since age 13 and won the state fiddle championship at 16. A
    Houma native from bayou country, his sound is a gumbo of Cajun, zydeco, swamp
    pop, and a little rock and roll. He is a Louisiana Music Hall of Famer who has
    played throughout the US, Canada, France, and Central and South America. Over
    40 years in, his energy on stage has not dimmed one bit.
  about_source: researched
  websites:
  - https://www.waylont.com/
- name: Nathan and the Zydeco Cha Chas
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '15:30'
  end: '16:40'
  genre: Zydeco
  about: |-
    Nathan Williams Sr. grew up in a French Creole-speaking home in St. Martinville
    and founded his band in 1985 after a recommendation from Buckwheat Zydeco
    landed him a deal with Rounder Records. For nearly four decades the Zydeco
    Cha Chas have packed dance floors from his brother's convenience store in
    Lafayette to Lincoln Center and the Grand Ole Opry. Their 2023 Grammy
    nomination for Lucky Man confirmed what fans already knew: Nathan is the real
    deal.
  about_source: researched
  websites:
  - https://zydecochachas.com/
- name: Amanda Shaw
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '17:00'
  end: '18:10'
  genre: Cajun
  about: |-
    Amanda Shaw picked up a violin at age four and became the youngest soloist
    ever to appear with the Baton Rouge Symphony at seven. A Mandeville native
    raised on fais do-dos and New Orleans funk alike, she signed with Rounder
    Records at 15 and has since appeared on Dick Clark's New Year's Rockin' Eve
    and the Macy's Thanksgiving Day Parade. A Louisiana Music Hall of Famer with
    nine releases and counting, she brings a joyful, fiddle-driven energy that
    bridges Cajun tradition and modern showmanship.
  about_source: researched
  websites:
  - https://amandashaw.com/
- name: Johnny Sketch and the Dirty Notes
  stage: Willow Dispensary Stage
  date: '2026-04-16'
  start: '18:45'
  end: '20:00'
  genre: Funk
  about: |-
    Johnny Sketch and the Dirty Notes formed in 2001 to win a Loyola University
    battle of the bands and never stopped. Classically and jazz-trained, the
    six-piece -- keys, sax, trumpet, guitar, bass, and drums -- creates music
    that is analytically interesting and impossibly danceable. Their carefully
    crafted live show blends jazz, blues, funk, and rock, and has earned them a
    devoted national following. Closing out the Willow stage Thursday night, they
    will leave nothing on the table.
  about_source: researched
  websites:
  - https://www.johnnysketch.com/
- name: Red Hot Brass Band
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '11:10'
  end: '12:30'
  genre: Brass Band
  about: |-
    The Red Hot Brass Band started in 2006 under the mentorship of revered groups
    like the Storyville Stompers and the Treme Brass Band. Dedicated to preserving
    the traditions that accompany the jazz culture of New Orleans, they play a
    straight-ahead traditional brass sound that sets the right mood for a day of
    music on the Louisiana Fish Fry Stage.
  about_source: researched
  websites:
  - https://frenchquarterfest.org/artists/red-hot-brass-band/
- name: 504 Millz
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '12:35'
  end: '13:05'
  genre: Electronic / DJ
  about: |-
    504 Millz is a New Orleans-based producer and DJ who specializes in bounce
    music, the high-energy call-and-response style born in the city's housing
    projects. Known for fiery remixes and original productions, 504 Millz keeps
    the party going with bass-heavy beats and Mardi Gras Indian-influenced
    rhythms that are impossible to stand still to.
  about_source: researched
  websites:
  - https://soundcloud.com/killa-millz
- name: J.A.M. Brass Band
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '13:10'
  end: '14:30'
  genre: Brass Band
  about: |-
    J.A.M. Brass Band is a tight, exciting ensemble on the New Orleans brass
    band scene. Known for clean musicianship and an energetic sound, they hold
    down regular gigs at Balcony Music Club and have become a familiar presence
    at local festivals. Their set on the Fish Fry Stage is a chance to catch a
    rising group keeping the brass tradition fresh.
  about_source: researched
  websites: []
- name: Zeus
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '14:35'
  end: '15:15'
  genre: Electronic / DJ
  about: |-
    Zeus is a New Orleans-based artist on the local bounce and hip-hop scene.
    Performing on the Louisiana Fish Fry Stage alongside brass bands and DJs,
    Zeus brings high-energy beats and crowd-moving rhythms that fit right into
    the stage's mix of brass and DJ talent.
  about_source: generated
  websites: []
- name: SOUL Brass Band
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '15:20'
  end: '16:40'
  genre: Brass Band
  about: |-
    SOUL Brass Band is the brainchild of percussionist Derrick 'Smoker' Freeman,
    Billboard-charting saxophonist James Martin, and Grammy-winning trombonist
    Miles Lyons. The ensemble bridges classic brass band tradition with contemporary
    funk, hip-hop, and soul, capturing the sound and spirit of modern New Orleans.
    Known for electrifying performances at Jazz Fest and French Quarter Fest, they
    are expanding the legacy of New Orleans brass for audiences worldwide.
  about_source: researched
  websites:
  - https://soulbrassband.com/
- name: DJ Legatron Prime
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '16:45'
  end: '17:30'
  genre: Electronic / DJ
  about: |-
    DJ Legatron Prime -- born Sage Edgerson -- is a New Orleans native and multi-
    genre DJ who has been a force in the city's nightlife since 2015. She holds
    down a Saturday headliner slot at The Dragons Den with her weekly PRIMETIME
    party and co-curates Where My Girls At? NOLA, the city's only monthly women's
    party. Featured on Boiler Room, nominated for Offbeat Best DJ, and recognized
    in Gambit's 40 Under 40, she spins Black girl magic across every genre.
  about_source: researched
  websites:
  - https://www.legatronprime.com/
- name: New Orleans Nightcrawlers
  stage: Louisiana Fish Fry Stage
  date: '2026-04-16'
  start: '17:35'
  end: '18:55'
  genre: Brass Band
  about: |-
    The Nightcrawlers are a funky, rootsy brass band supergroup that took home the
    2021 Grammy for Best Regional Roots Music Album with Atmosphere and earned a
    second nomination for Too Much to Hold. Founded in 1994 by Tom McDermott, Matt
    Perrine, and Kevin Clark as a writers' workshop for brass band music, the group
    stood apart from day one with clever songwriting and Latin-tinged arrangements.
    Their set is one of Thursday's can't-miss performances.
  about_source: researched
  websites:
